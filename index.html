<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Plein Écran Tactique - Gironde</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>

    <style>
        body, html { margin: 0; padding: 0; height: 100%; background-color: #121212; font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif; overflow: hidden; }
        #map { height: 100vh; width: 100%; background: #121212; }
        
        /* BANDEAU SUPÉRIEUR DES OUTILS (MASQUABLE) */
        #top-interface {
            position: absolute; top: 10px; left: 10px; right: 10px; z-index: 1000;
            background: rgba(25, 25, 25, 0.96); color: white; padding: 10px; 
            border-radius: 8px; border: 1px solid #333;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); font-size: 13px;
            transition: all 0.3s ease;
        }
        .outils-row { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; justify-content: space-between; }
        .flex-group { display: flex; gap: 6px; align-items: center; }
        
        /* BOUTONS UI */
        .btn-action { padding: 8px 12px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 11px; }
        .btn-purple { background: #8b5cf6; color: white; }
        .btn-blue { background: #0284c7; color: white; }
        .btn-red { background: #b91c1c; color: white; }
        .btn-toggle { background: #374151; color: white; border: 1px solid #4b5563; }
        
        .select-ui, .input-pixel { background: #333; border: 1px solid #555; color: white; padding: 6px; border-radius: 3px; font-weight: bold; font-size: 11px; }
        .input-pixel { width: 55px; text-align: center; }
        
        /* LÉGENDE FLOTTANTE FIXE (TOUJOURS VISIBLE) */
        #legende-ops {
            position: absolute; bottom: 15px; right: 15px; z-index: 1010;
            background: rgba(20, 20, 20, 0.9); padding: 8px 12px; border-radius: 6px;
            border: 1px solid #444; box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            display: flex; flex-direction: column; gap: 4px; width: 85px; font-size: 10px; font-weight: bold;
        }
        .legende-item { display: flex; align-items: center; justify-content: space-between; padding: 2px 5px; border-radius: 3px; color: black; }

        #resultat-mesure { font-weight: bold; color: #38bdf8; font-size: 11px; text-align: center; }
        #file-input { display: none; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div style="position: absolute; top: 12px; right: 15px; z-index: 1005;">
        <button class="btn-action btn-toggle" onclick="basculerInterface()" id="btn-masquer">👁️ Masquer les outils</button>
    </div>

    <div id="top-interface">
        <div class="outils-row" style="margin-bottom: 6px;">
            <div class="flex-group">
                <button class="btn-action btn-purple" onclick="document.getElementById('file-input').click()">📁 Dalle PDF</button>
                <input type="file" id="file-input" accept="application/pdf">
                <button class="btn-action btn-red" onclick="effacerTout()">❌ Effacer</button>
            </div>
            <div id="resultat-mesure">Double-cliquez sur le PDF pour les périmètres</div>
        </div>
        
        <div class="outils-row" style="border-top: 1px solid #333; padding-top: 6px;">
            <div class="flex-group">
                <span style="font-size:11px; color:#aaa;">Règle :</span>
                <select id="select-distance" class="select-ui">
                    <option value="400">400 m</option>
                    <option value="1000">1 km</option>
                    <option value="2000" selected>2 km (Carré DFCI)</option>
                    <option value="4000">4 km</option>
                </select>
                <button id="btn-regle" class="btn-action btn-blue" onclick="basculerModeRegle()">📏 Activer</button>
            </div>
            
            <div class="flex-group">
                <span style="font-size:11px; color:#aaa;">Échelle :</span>
                <input type="number" id="input-scale" class="input-pixel" value="300" onchange="mettreAJourEchelleDirecte(this.value)"> <span style="font-size:11px; color:#aaa;">px pour 2km</span>
            </div>
        </div>
    </div>

    <div id="legende-ops">
        <div class="legende-item" style="background: #ff5252;"><span>200 m</span></div>
        <div class="legende-item" style="background: #ffab40;"><span>400 m</span></div>
        <div class="legende-item" style="background: #ffd740;"><span>1 km</span></div>
        <div class="legende-item" style="background: #29b6f6; color: white;"><span>2 km</span></div>
        <div class="legende-item" style="background: #66bb6a;"><span>4 km</span></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        let PIXELS_POUR_2000M = 300; 
        let modeRegleActive = false;
        let interfaceMasquee = false;
        let pointsMesure = [];

        const map = L.map('map', {
            crs: L.CRS.Simple,
            zoomControl: false,
            minZoom: -2,
            maxZoom: 3,
            doubleClickZoom: false
        }).setView([0, 0], 0);

        L.control.zoom({ position: 'bottomleft' }).addTo(map);

        const layerGroup = L.featureGroup().addTo(map);
        const regleGroup = L.featureGroup().addTo(map);
        let currentPlan = null;

        function metreEnUnites(metres) {
            return (metres * PIXELS_POUR_2000M) / 2000;
        }

        function mettreAJourEchelleDirecte(nouvelleValeur) {
            PIXELS_POUR_2000M = parseFloat(nouvelleValeur);
        }

        // MASQUER / AFFICHER LES CONFIGURATIONS 
        function basculerInterface() {
            interfaceMasquee = !interfaceMasquee;
            const bandeau = document.getElementById('top-interface');
            const btn = document.getElementById('btn-masquer');
            
            if (interfaceMasquee) {
                bandeau.style.opacity = '0';
                bandeau.style.pointerEvents = 'none';
                btn.innerText = "👁️ Afficher les outils";
                btn.style.background = "#8b5cf6";
            } else {
                bandeau.style.opacity = '1';
                bandeau.style.pointerEvents = 'auto';
                btn.innerText = "👁️ Masquer les outils";
                btn.style.background = "#374151";
            }
        }

        function basculerModeRegle() {
            modeRegleActive = !modeRegleActive;
            const btn = document.getElementById('btn-regle');
            const divResultat = document.getElementById('resultat-mesure');
            
            if (modeRegleActive) {
                btn.style.background = '#eab308';
                btn.innerText = "🛑 Règle Active";
                divResultat.innerText = "Sélectionnez vos 2 points sur la carte...";
                pointsMesure = [];
                regleGroup.clearLayers();
            } else {
                btn.style.background = '#0284c7';
                btn.innerText = "📏 Activer";
                divResultat.innerText = "Double-cliquez pour poser les périmètres";
                regleGroup.clearLayers();
            }
        }

        // INTERACTION CLIC
        map.on('click', function(e) {
            if (!modeRegleActive) return;

            pointsMesure.push(e.latlng);
            L.circleMarker(e.latlng, { radius: 4, color: '#eab308', fillColor: '#fff', fillOpacity: 1 }).addTo(regleGroup);

            if (pointsMesure.length === 2) {
                const dx = pointsMesure[1].lng - pointsMesure[0].lng;
                const dy = pointsMesure[1].lat - pointsMesure[0].lat;
                const distancePixels = Math.sqrt(dx * dx + dy * dy);
                const distanceCibleMetres = parseFloat(document.getElementById('select-distance').value);
                const etalonCalcule = Math.round((distancePixels / distanceCibleMetres) * 2000);

                L.polyline(pointsMesure, { color: '#eab308', weight: 3, dashArray: '4, 4' }).addTo(regleGroup);
                document.getElementById('resultat-mesure').innerText = `Échelle étalonnée : ${etalonCalcule} px`;
                document.getElementById('input-scale').value = etalonCalcule;
                PIXELS_POUR_2000M = etalonCalcule;

                modeRegleActive = false;
                document.getElementById('btn-regle').style.background = '#0284c7';
                document.getElementById('btn-regle').innerText = "📏 Activer";
            }
        });

        // TRACÉ SUR DOUBLE CLIC
        map.on('dblclick', function(e) {
            if (!currentPlan || modeRegleActive) return;

            layerGroup.clearLayers();
            const pointCentral = e.latlng;

            const configurations = [
                { rayon: 200, couleur: '#ff5252' },
                { rayon: 400, couleur: '#ffab40' },
                { rayon: 1000, couleur: '#ffd740' },
                { rayon: 2000, couleur: '#29b6f6' },
                { rayon: 4000, couleur: '#66bb6a' }
            ];

            configurations.forEach(config => {
                L.circle(pointCentral, {
                    radius: metreEnUnites(config.rayon),
                    color: config.couleur,
                    weight: 3,
                    fillColor: config.couleur,
                    fillOpacity: 0.05,
                    dashArray: '5, 5'
                }).addTo(layerGroup);
            });

            L.circleMarker(pointCentral, { radius: 5, color: '#fff', fillColor: '#000', fillOpacity: 1, weight: 2 }).addTo(layerGroup);
        });

        // RENDU DU DOCUMENT PDF
        document.getElementById('file-input').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            effacerTout();

            const fileReader = new FileReader();
            fileReader.onload = function() {
                const typedarray = new Uint8Array(this.result);
                pdfjsLib.getDocument(typedarray).promise.then(function(pdf) {
                    pdf.getPage(1).then(function(page) {
                        const viewport = page.getViewport({ scale: 2.0 });
                        const canvas = document.createElement('canvas');
                        canvas.height = viewport.height;
                        canvas.width = viewport.width;
                        const context = canvas.getContext('2d');

                        page.render({ canvasContext: context, viewport: viewport }).promise.then(function() {
                            const imgUrl = canvas.toDataURL('image/png');
                            const h = viewport.height;
                            const w = viewport.width;
                            const limitesImage = [[0, 0], [h, w]];

                            currentPlan = L.imageOverlay(imgUrl, limitesImage).addTo(map);
                            map.fitBounds(limitesImage);
                        });
                    });
                });
            };
            fileReader.readAsArrayBuffer(file);
        });

        function effacerTout() {
            layerGroup.clearLayers();
            regleGroup.clearLayers();
            if (currentPlan) { map.removeLayer(currentPlan); currentPlan = null; }
            document.getElementById('resultat-mesure').innerText = "Double-cliquez pour poser les périmètres";
            pointsMesure = [];
            modeRegleActive = false;
            document.getElementById('btn-regle').style.background = '#0284c7';
            document.getElementById('btn-regle').innerText = "📏 Activer";
        }
    </script>
</body>
</html>
