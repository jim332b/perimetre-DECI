<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tableau Tactique Évolué - Gironde</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>

    <style>
        body, html { margin: 0; padding: 0; height: 100%; background-color: #121212; font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif; overflow: hidden; }
        #map { height: 100vh; width: 100%; background: #121212; }
        
        #panel-controls {
            position: absolute; top: 15px; left: 15px; z-index: 1000;
            background: rgba(30, 30, 30, 0.95); color: white; padding: 15px; 
            border-radius: 8px; border: 1px solid #444; width: 290px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.6); font-size: 13px;
        }
        #panel-controls h3 { margin: 0 0 10px 0; color: #a855f7; text-transform: uppercase; font-size: 14px; text-align: center;}
        
        .btn-ui { width: 100%; padding: 10px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 11px; margin-top: 5px; }
        .btn-purple { background: #8b5cf6; color: white; }
        .btn-blue { background: #0284c7; color: white; }
        .btn-red { background: #c62828; color: white; }
        #file-input { display: none; }
        
        /* Zone d'étalonnage */
        .zone-etalonnage { background: #222; padding: 10px; border-radius: 4px; border: 1px dashed #555; margin-top: 10px; }
        .select-ui, .input-pixel { background: #333; border: 1px solid #555; color: white; padding: 5px; border-radius: 3px; font-weight: bold; font-size: 12px; }
        .select-ui { width: 100%; margin-bottom: 8px; }
        .input-pixel { width: 70px; text-align: center; }
        
        .box-legende { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; margin-top: 15px; text-align: center; font-size: 9px; font-weight: bold; }
        .item-legende { padding: 4px 2px; border-radius: 3px; color: black; }
        
        #instructions { background: #1a1a1a; padding: 8px; border-radius: 4px; border-left: 3px solid #8b5cf6; margin-bottom: 10px; font-size: 11px; color: #ccc; }
        #resultat-mesure { font-weight: bold; color: #38bdf8; margin-top: 5px; min-height: 16px; text-align: center; }
        .ligne-reglage { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div id="panel-controls">
        <h3>PC Opérationnel Gironde</h3>
        
        <div id="instructions">
            <b>Périmètres :</b> Double-cliquez pour les valider.<br>
            <b>Étalonnage :</b> Choisissez la distance cible, activez la règle et cliquez sur vos 2 repères de carte.
        </div>

        <button class="btn-ui btn-purple" onclick="document.getElementById('file-input').click()">📁 Ouvrir une dalle PDF</button>
        <input type="file" id="file-input" accept="application/pdf">
        
        <div class="zone-etalonnage">
            <label style="font-size:11px; color:#aaa; display:block; margin-bottom:4px;">1. Distance à mesurer sur le PDF :</label>
            <select id="select-distance" class="select-ui">
                <option value="400">400 mètres (Zone / Repère court)</option>
                <option value="1000">1 000 mètres (1 km)</option>
                <option value="2000" selected>2 000 mètres (Carré DFCI standard)</option>
                <option value="4000">4 000 mètres (4 km)</option>
            </select>

            <button id="btn-regle" class="btn-ui btn-blue" onclick="basculerModeRegle()">📏 Activer la règle</button>
            <div id="resultat-mesure"></div>
            
            <div class="ligne-reglage">
                <span>Rapport d'échelle :</span>
                <div>
                    <input type="number" id="input-scale" class="input-pixel" value="300" onchange="mettreAJourEchelleDirecte(this.value)"> px
                </div>
            </div>
            <span style="font-size:10px; color:#aaa; display:block; text-align:right; margin-top:2px;">(Valeur étalon pour 2 km)</span>
        </div>
        
        <button class="btn-ui btn-red" style="margin-top:10px;" onclick="effacerTout()">❌ Effacer l'écran</button>

        <div class="box-legende">
            <div class="item-legende" style="background: #ff5252;">200m</div>
            <div class="item-legende" style="background: #ffab40;">400m</div>
            <div class="item-legende" style="background: #ffd740;">1km</div>
            <div class="item-legende" style="background: #29b6f6; color:white;">2km</div>
            <div class="item-legende" style="background: #66bb6a;">4km</div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        // Base de calcul toujours ramenée à l'étalon de 2000m pour Leaflet
        let PIXELS_POUR_2000M = 300; 
        let modeRegleActive = false;
        let pointsMesure = [];

        const map = L.map('map', {
            crs: L.CRS.Simple,
            zoomControl: false,
            minZoom: -2,
            maxZoom: 3,
            doubleClickZoom: false
        }).setView([0, 0], 0);

        L.control.zoom({ position: 'bottomright' }).addTo(map);

        const layerGroup = L.featureGroup().addTo(map);
        const regleGroup = L.featureGroup().addTo(map);
        let currentPlan = null;

        function metreEnUnites(metres) {
            return (metres * PIXELS_POUR_2000M) / 2000;
        }

        function mettreAJourEchelleDirecte(nouvelleValeur) {
            PIXELS_POUR_2000M = parseFloat(nouvelleValeur);
        }

        function basculerModeRegle() {
            modeRegleActive = !modeRegleActive;
            const btn = document.getElementById('btn-regle');
            const divResultat = document.getElementById('resultat-mesure');
            
            if (modeRegleActive) {
                btn.style.background = '#eab308';
                btn.innerText = "🛑 Règle active (cliquez 2 points)";
                divResultat.innerText = "Mesurez la distance sélectionnée...";
                pointsMesure = [];
                regleGroup.clearLayers();
            } else {
                btn.style.background = '#0284c7';
                btn.innerText = "📏 Activer la règle";
                divResultat.innerText = "";
                regleGroup.clearLayers();
            }
        }

        // ================= LOGIQUE DE CLIC ET DU CALCUL D'ÉCHELLE CRITIQUÉ =================
        map.on('click', function(e) {
            if (!modeRegleActive) return;

            pointsMesure.push(e.latlng);
            L.circleMarker(e.latlng, { radius: 4, color: '#eab308', fillColor: '#fff', fillOpacity: 1 }).addTo(regleGroup);

            if (pointsMesure.length === 2) {
                // 1. Distance brute lue en pixels
                const dx = pointsMesure[1].lng - pointsMesure[0].lng;
                const dy = pointsMesure[1].lat - pointsMesure[0].lat;
                const distancePixels = Math.sqrt(dx * dx + dy * dy);

                // 2. Récupération de la distance cible choisie par l'opérateur (ex: 400 ou 2000)
                const distanceCibleMetres = parseFloat(document.getElementById('select-distance').value);

                // 3. Règle de trois pour convertir la mesure en valeur étalon de 2000m
                // Formule : (Pixels_lus / Distance_lue_en_m) * 2000
                const etalonCalcule = Math.round((distancePixels / distanceCibleMetres) * 2000);

                // Dessin de la ligne témoin
                L.polyline(pointsMesure, { color: '#eab308', weight: 3, dashArray: '4, 4' }).addTo(regleGroup);

                // Affichage des informations calculées
                document.getElementById('resultat-mesure').innerText = `Lu : ${Math.round(distancePixels)}px pour ${distanceCibleMetres}m`;
                
                // Injection automatique dans la case de contrôle et mise à jour du moteur
                document.getElementById('input-scale').value = etalonCalcule;
                PIXELS_POUR_2000M = etalonCalcule;

                // Fermeture de la règle
                modeRegleActive = false;
                document.getElementById('btn-regle').style.background = '#0284c7';
                document.getElementById('btn-regle').innerText = "📏 Activer la règle";
            }
        });

        // ================= DOUBLE-CLIC : POSER LES PERIMETRES =================
        map.on('dblclick', function(e) {
            if (!currentPlan || modeRegleActive) return;

            layerGroup.clearLayers();
            const pointCentral = e.latlng;

            const configurations = [
                { rayon: 200, couleur: '#ff5252' },
                { rayon: 400, couleur: '#ffab40' },
                { rayon: 1000, couleur: '#ffd740' },
                { rayon: 2000, couleur: '#29b6f6' },
                { rayon: 4000, couleur: '#66bb6a' }
            ];

            configurations.forEach(config => {
                L.circle(pointCentral, {
                    radius: metreEnUnites(config.rayon),
                    color: config.couleur,
                    weight: 3,
                    fillColor: config.couleur,
                    fillOpacity: 0.05,
                    dashArray: '5, 5'
                }).addTo(layerGroup);
            });

            L.circleMarker(pointCentral, { radius: 5, color: '#fff', fillColor: '#000', fillOpacity: 1, weight: 2 }).addTo(layerGroup);
        });

        // ================= RECEPTION PDF =================
        document.getElementById('file-input').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            effacerTout();

            const fileReader = new FileReader();
            fileReader.onload = function() {
                const typedarray = new Uint8Array(this.result);
                pdfjsLib.getDocument(typedarray).promise.then(function(pdf) {
                    pdf.getPage(1).then(function(page) {
                        const viewport = page.getViewport({ scale: 2.0 });
                        const canvas = document.createElement('canvas');
                        canvas.height = viewport.height;
                        canvas.width = viewport.width;
                        
                        const context = canvas.getContext('2d');

                        page.render({ canvasContext: context, viewport: viewport }).promise.then(function() {
                            const imgUrl = canvas.toDataURL('image/png');
                            const h = viewport.height;
                            const w = viewport.width;
                            const limitesImage = [[0, 0], [h, w]];

                            currentPlan = L.imageOverlay(imgUrl, limitesImage).addTo(map);
                            map.fitBounds(limitesImage);
                        });
                    });
                });
            };
            fileReader.readAsArrayBuffer(file);
        });

        function effacerTout() {
            layerGroup.clearLayers();
            regleGroup.clearLayers();
            if (currentPlan) { map.removeLayer(currentPlan); currentPlan = null; }
            document.getElementById('resultat-mesure').innerText = "";
            pointsMesure = [];
            modeRegleActive = false;
            document.getElementById('btn-regle').style.background = '#0284c7';
            document.getElementById('btn-regle').innerText = "📏 Activer la règle";
        }
    </script>
</body>
</html>
