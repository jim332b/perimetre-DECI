<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tableau Tactique - Gironde Cadri400</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>

    <style>
        body, html { margin: 0; padding: 0; height: 100%; background-color: #121212; font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif; overflow: hidden; }
        #map { height: 100vh; width: 100%; background: #121212; }
        
        #panel-controls {
            position: absolute; top: 15px; left: 15px; z-index: 1000;
            background: rgba(30, 30, 30, 0.95); color: white; padding: 15px; 
            border-radius: 8px; border: 1px solid #444; width: 280px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.6); font-size: 13px;
        }
        #panel-controls h3 { margin: 0 0 10px 0; color: #a855f7; text-transform: uppercase; font-size: 14px; text-align: center;}
        
        .btn-ui { width: 100%; padding: 12px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 11px; margin-top: 5px; }
        .btn-purple { background: #8b5cf6; color: white; }
        .btn-red { background: #c62828; color: white; }
        #file-input { display: none; }
        
        .box-legende { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; margin-top: 15px; text-align: center; font-size: 9px; font-weight: bold; }
        .item-legende { padding: 4px 2px; border-radius: 3px; color: black; }
        
        #instructions { background: #222; padding: 8px; border-radius: 4px; border-left: 3px solid #8b5cf6; margin-bottom: 10px; font-size: 11px; color: #ccc; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div id="panel-controls">
        <h3>PC Opérationnel Gironde</h3>
        
        <div id="instructions">
            1. Chargez une dalle PDF<br>
            2. <b>Double-cliquez</b> sur la carte pour positionner/valider les périmètres.
        </div>

        <button class="btn-ui btn-purple" onclick="document.getElementById('file-input').click()">📁 Ouvrir une dalle PDF</button>
        <input type="file" id="file-input" accept="application/pdf">
        
        <button class="btn-ui btn-red" onclick="effacerPerimetres()">❌ Effacer les cercles</button>

        <div class="box-legende">
            <div class="item-legende" style="background: #ff5252;">200m</div>
            <div class="item-legende" style="background: #ffab40;">400m</div>
            <div class="item-legende" style="background: #ffd740;">1km</div>
            <div class="item-legende" style="background: #29b6f6; color:white;">2km</div>
            <div class="item-legende" style="background: #66bb6a;">4km</div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        // ÉCHELLE REEL DU CADRI400 EN PIXELS (À ajuster selon vos PDF si besoin)
        // Sur un rendu standard, si un carré de 2km fait environ 300 pixels de large :
        const PIXELS_POUR_2000M = 320; 

        // Initialisation de Leaflet en mode "Image Simple" (Simple CRS)
        // Ce mode désactive le GPS et la boussole terrestre pour traiter le PDF comme un tableau de dessin
        const map = L.map('map', {
            crs: L.CRS.Simple,
            zoomControl: false,
            minZoom: -2,
            maxZoom: 3,
            doubleClickZoom: false // Désactivé pour nous laisser poser les cercles au double-clic
        }).setView([0, 0], 0);

        L.control.zoom({ position: 'bottomright' }).addTo(map);

        const layerGroup = L.featureGroup().addTo(map);
        let currentPlan = null;

        // Conversion des mètres réels en "pixels/unités" pour ce format de document
        function metreEnUnites(metres) {
            return (metres * PIXELS_POUR_2000M) / 2000;
        }

        // ================= CHARGEMENT DU PDF SUR DIMENSION STANDARD =================
        document.getElementById('file-input').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            if (currentPlan) { map.removeLayer(currentPlan); layerGroup.clearLayers(); }

            const fileReader = new FileReader();
            fileReader.onload = function() {
                const typedarray = new Uint8Array(this.result);
                pdfjsLib.getDocument(typedarray).promise.then(function(pdf) {
                    pdf.getPage(1).then(function(page) {
                        // On force une dimension standard de haute qualité (scale: 2.0)
                        const viewport = page.getViewport({ scale: 2.0 });
                        const canvas = document.createElement('canvas');
                        canvas.height = viewport.height;
                        canvas.width = viewport.width;
                        
                        const context = canvas.getContext('2d');

                        page.render({ canvasContext: context, viewport: viewport }).promise.then(function() {
                            const imgUrl = canvas.toDataURL('image/png');
                            
                            // Dimensions standard de l'image créée
                            const h = viewport.height;
                            const w = viewport.width;
                            const limitesImage = [[0, 0], [h, w]];

                            // Positionnement du PDF de façon opaque au centre du tableau de bord
                            currentPlan = L.imageOverlay(imgUrl, limitesImage).addTo(map);
                            
                            // Recentrer et caler la vue sur la dalle entière
                            map.fitBounds(limitesImage);
                        });
                    });
                });
            };
            fileReader.readAsArrayBuffer(file);
        });

        // ================= DOUBLE-CLIC : POSITIONNER ET VALIDER LES RAYONS =================
        map.on('dblclick', function(e) {
            if (!currentPlan) {
                alert("Veuillez d'abord charger une dalle PDF.");
                return;
            }

            // On efface les cercles précédents si on change d'avis
            layerGroup.clearLayers();

            const pointCentral = e.latlng;

            // Configuration des cercles basés sur notre échelle fixe de pixels
            const configurations = [
                { rayon: 200, couleur: '#ff5252' },
                { rayon: 400, couleur: '#ffab40' },
                { rayon: 1000, couleur: '#ffd740' },
                { rayon: 2000, couleur: '#29b6f6' },
                { rayon: 4000, couleur: '#66bb6a' }
            ];

            // Tracé des cercles à taille constante et fixe
            configurations.forEach(config => {
                L.circle(pointCentral, {
                    radius: metreEnUnites(config.rayon),
                    color: config.couleur,
                    weight: 3,
                    fillColor: config.couleur,
                    fillOpacity: 0.05,
                    dashArray: '5, 5'
                }).addTo(layerGroup);
            });

            // Petit marqueur central de validation de l'impact
            L.circleMarker(pointCentral, { radius: 5, color: '#fff', fillColor: '#000', fillOpacity: 1, weight: 2 }).addTo(layerGroup);
        });

        function effacerPerimetres() {
            layerGroup.clearLayers();
        }
    </script>
</body>
</html>
